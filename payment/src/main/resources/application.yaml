spring:
  application:
    name: payment-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  lifecycle:
    timeout-per-shutdown-phase: 30s

  mvc:
    problemdetails:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:h2:mem:paymentdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${SERVER_PORT:8083}
  shutdown: graceful

# ==================== ⭐ Chaos Engineering 시뮬레이션 ====================
# 운영 시연 장치 — Alertmanager 알림 규칙 검증용
# 환경변수로 끄거나 조정 가능 (운영 환경에선 enabled=false 권장)
chaos:
  enabled: ${CHAOS_ENABLED:true}
  error-rate-percent: ${CHAOS_ERROR_RATE:5}      # 5% 확률로 결제 거절
  min-delay-ms: ${CHAOS_MIN_DELAY:100}           # 최소 100ms 지연
  max-delay-ms: ${CHAOS_MAX_DELAY:2000}          # 최대 2000ms 지연

# ==================== Actuator ====================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,env,loggers
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      show-components: always
    prometheus:
      access: read-only
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
  info:
    env:
      enabled: true
    build:
      enabled: true
    git:
      enabled: true

info:
  app:
    description: Payment microservice for DevOps portfolio (with intentional chaos for ops demo)
    profile: ${spring.profiles.active}

logging:
  level:
    root: INFO
    com.portfolio: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/paymentdb}
    username: ${DB_USERNAME:payment}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  h2:
    console:
      enabled: false

logging:
  level:
    root: INFO
    com.portfolio: INFO
    org.hibernate.SQL: INFO