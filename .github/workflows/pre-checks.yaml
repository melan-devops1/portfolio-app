###############################################################################
# PR Checks — 변경된 서비스만 lint + test
#
# 트리거: PR open/sync (main 대상)
# 동작: 변경된 서비스 감지 → matrix로 병렬 lint + 테스트
#
# Gradle 프로젝트 구조 (패턴 B — 독립 프로젝트 모음):
#   portfolio-app/
#   ├── product-service/   ← 독립 Gradle 프로젝트 (자체 gradlew, settings.gradle)
#   ├── order-service/     ← 독립
#   └── payment-service/   ← 독립
#   각 서비스 폴더로 cd 후 ./gradlew 호출 필요.
#
# 액션 버전 (2026-04 기준 Node 24 호환):
#   actions/checkout@v6
#   actions/setup-java@v4 (Node 24 호환됨)
#   gradle/actions/setup-gradle@v4
#   gradle/actions/wrapper-validation@v4
#   dorny/paths-filter@v3 (Node 20, 2026-09까지 작동, 대체재 없음)
#   actions/upload-artifact@v4 (Node 24 호환됨)
###############################################################################

name: PR Checks

on:
  pull_request:
    branches: [main]

# 동시 실행 정리: 같은 PR에 새 커밋 push 시 이전 워크플로우 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ─── 1단계: 변경된 서비스 감지 ───────────────────────────────────
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # 각 필터의 이름이 "서비스 이름"이 됨
          # outputs.changes는 매칭된 필터 이름의 JSON 배열
          # 예: ["product-service", "order-service"]
          filters: |
            product-service:
              - 'product-service/**'
            order-service:
              - 'order-service/**'
            payment-service:
              - 'payment-service/**'

  # ─── 2단계: 변경된 서비스만 lint + test ─────────────────────────
  lint-and-test:
    name: Lint & Test (${{ matrix.service }})
    needs: detect-changes
    # 변경된 서비스가 1개 이상일 때만 실행
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # 한 서비스 실패해도 다른 서비스는 계속
      matrix:
        # detect-changes에서 출력한 JSON 배열을 matrix로
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    # 모든 step의 작업 디렉토리를 서비스 폴더로 (패턴 B 정합)
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4
        # 서비스 폴더가 build-root (각 서비스가 독립 프로젝트)
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Run tests for ${{ matrix.service }}
        run: ./gradlew test --no-daemon

      - name: Upload test report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.service }}
          # working-directory가 서비스 폴더라 상대 경로
          path: build/reports/tests/
          retention-days: 7