###############################################################################
# PR Checks — 변경된 서비스만 lint + test
#
# 트리거: PR open/sync (main 대상)
# 동작: 변경된 서비스 감지 → matrix로 병렬 lint + 테스트
# 외부 자원 영향: 0 (AWS 호출 없음, 빌드 산출물 push 없음)
#
# 변경된 서비스 감지: dorny/paths-filter@v3
# Java/Gradle: actions/setup-java@v4 + gradle/actions/setup-gradle@v3 (자동 캐싱)
###############################################################################

name: PR Checks

on:
  pull_request:
    branches: [main]

# 동시 실행 정리: 같은 PR에 새 커밋 push 시 이전 워크플로우 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ─── 1단계: 변경된 서비스 감지 ───────────────────────────────────
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      services: ${{ steps.filter.outputs.changes }} # 매칭된 필터 이름들의 JSON 배열
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3 # Node 20, 2026-09까지 작동 (대체재 없음)
        id: filter
        with:
          # 각 필터의 이름이 "서비스 이름"이 됨
          # outputs.changes는 매칭된 필터 이름의 JSON 배열
          # 예: ["product-service", "order-service"]
          filters: |
            product-service:
              - 'product-service/**'
            order-service:
              - 'order-service/**'
            payment-service:
              - 'payment-service/**'

  # ─── 2단계: 변경된 서비스만 lint + test ─────────────────────────
  lint-and-test:
    name: Lint & Test (${{ matrix.service }})
    needs: detect-changes
    # 변경된 서비스가 1개 이상일 때만 실행
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # 한 서비스 실패해도 다른 서비스는 계속
      matrix:
        # detect-changes에서 출력한 JSON 배열을 matrix로
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v4     # Node 24 호환 ✅
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4
        # gradle wrapper 캐싱 + ~/.gradle/caches 자동 캐싱
        # cache-read-only는 PR 빌드의 캐시가 main의 캐시를 오염시키지 않게 함
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          build-root-directory: ${{ matrix.service }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Run tests for ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          ./gradlew test --no-daemon
      - name: Upload test report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4    # Node 24 호환 ✅
        with:
          name: test-reports-${{ matrix.service }}
          path: ${{ matrix.service }}/build/reports/tests/
          retention-days: 7