###############################################################################
# Build and Push — main merge 시점 자동 빌드 + 수동 트리거(workflow_dispatch)
#
# 트리거:
#   1. push to main: 변경된 서비스 자동 감지 후 빌드/push (운영 표준)
#   2. workflow_dispatch: 수동 트리거 시 선택한 서비스 빌드/push
#      - 베이스 이미지 CVE 패치로 전체 재빌드 필요
#      - 운영 비상 상황 대응
#      - 코드 변경 없이 새 이미지 push 필요한 경우
#
# 동작 (둘 다):
#   1. 빌드 대상 서비스 결정 (paths-filter 또는 input)
#   2. matrix로 변경/선택된 서비스마다 병렬:
#      a. Gradle 빌드 (캐싱)
#      b. Docker 이미지 빌드 (BuildKit + 레이어 캐싱)
#      c. Trivy 스캔 (CRITICAL 차단, ADR-0010)
#      d. ECR push (commit SHA + latest 태그)
# 인증: OIDC (정적 자격증명 0개, ADR-0017)
###############################################################################

name: Build and Push

on:
  push:
    branches: [main]

  # 수동 트리거 — Actions 탭에서 "Run workflow" 버튼
  workflow_dispatch:
    inputs:
      services:
        description: '빌드할 서비스 선택'
        type: choice
        required: true
        default: all
        options:
          - all
          - product-service
          - order-service
          - payment-service

# 같은 브랜치에 빠르게 연속 push 시 최신 것만 실행
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # build 중간에 끊기면 ECR에 부분 업로드 위험 → 끝까지

jobs:
  # ─── 1단계: 빌드 대상 서비스 결정 ─────────────────────────────
  # push 트리거 시: paths-filter로 변경된 서비스만
  # workflow_dispatch 시: input으로 받은 서비스 (또는 all)
  detect-changes:
    name: Detect target services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.target.outputs.services }}
    steps:
      - uses: actions/checkout@v6
        with:
          # paths-filter가 직전 커밋과 비교 (push 트리거 시)
          fetch-depth: 2

      # push 트리거 시에만 실행
      - uses: dorny/paths-filter@v3
        if: github.event_name == 'push'
        id: filter
        with:
          filters: |
            product-service:
              - 'product-service/**'
            order-service:
              - 'order-service/**'
            payment-service:
              - 'payment-service/**'

      # 두 트리거의 결과를 통합해 output으로
      - name: Determine target services
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # 수동 트리거 시 — input 사용
            if [ "${{ inputs.services }}" = "all" ]; then
              echo 'services=["product-service","order-service","payment-service"]' >> "$GITHUB_OUTPUT"
              echo "Manual trigger: building ALL services"
            else
              echo "services=[\"${{ inputs.services }}\"]" >> "$GITHUB_OUTPUT"
              echo "Manual trigger: building ${{ inputs.services }}"
            fi
          else
            # push 트리거 시 — paths-filter 결과
            echo 'services=${{ steps.filter.outputs.changes }}' >> "$GITHUB_OUTPUT"
            echo "Push trigger: building changed services"
          fi

  # ─── 2단계: 빌드 + 스캔 + push ──────────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest

    # OIDC 사용을 위한 권한
    permissions:
      id-token: write    # JWT 발급용
      contents: read     # 코드 체크아웃

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      # ─── 코드 체크아웃 ────────────────────────────────────────
      - uses: actions/checkout@v6

      # ─── Java 21 + Gradle 캐싱 ────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      # ─── Gradle 빌드 ───────────────────────────────────────────
      - name: Build jar for ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: ./gradlew clean bootJar --no-daemon

      # ─── AWS OIDC 인증 (ADR-0017 첫 실전) ─────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      # ─── ECR 로그인 ────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ─── Docker BuildKit 셋업 (레이어 캐싱) ───────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── 이미지 메타데이터 (태그 자동 생성) ─────────────────
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/portfolio/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short        # 짧은 SHA (예: a1b2c3d)
            type=raw,value=latest                # latest 태그

      # ─── Docker 빌드 + push (BuildKit 캐싱) ────────────────────
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          # BuildKit이 SBOM + provenance 자동 첨부 (ADR-0010 보강 계획 실현)
          provenance: true
          sbom: true

      # ─── Trivy 보안 스캔 (ADR-0010) ───────────────────────────
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/portfolio/${{ matrix.service }}@${{ steps.build.outputs.digest }}
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
          format: 'table'

      # ─── Summary 출력 ──────────────────────────────────────────
      - name: Workflow summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Service**: ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ steps.login-ecr.outputs.registry }}/portfolio/${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags**:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "- **Digest**: \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY