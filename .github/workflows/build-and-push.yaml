###############################################################################
# Build and Push — main merge 시점 자동 빌드 + manifest 자동 갱신 + idempotent
#
# 트리거:
#   1. push to main: 변경된 서비스 자동 감지 후 빌드/push (운영 표준)
#   2. workflow_dispatch: 수동 트리거 시 선택한 서비스 빌드/push
#      - 베이스 이미지 CVE 패치로 전체 재빌드 필요
#      - 운영 비상 상황 대응
#      - 코드 변경 없이 새 이미지 push 필요한 경우
#   3. matrix 병렬:
#      a. ECR에 같은 SHA 태그 있는지 사전 체크 ⭐ (idempotent)
#      b. 없으면 빌드 + ECR push, 있으면 스킵
#      c. Trivy 스캔 (digest로 정확한 이미지)
#      d. portfolio-manifests의 image tag 자동 갱신 (5.4)
#   4. ArgoCD가 portfolio-manifests 변경 감지 → 자동 배포
#
# Idempotent 패턴 (운영 표준):
# - ECR IMMUTABLE 정책 + 같은 commit 재실행 사고 방지 (함정 #41)
# - Re-run failed jobs, 같은 commit cherry-pick, branch 머지 충돌 등에 대응
# - 이미 push된 이미지면 빌드/push 스킵, manifest 갱신만 진행
###############################################################################

name: Build and Push

on:
  push:
    branches: [main]

  # 수동 트리거 — Actions 탭에서 "Run workflow" 버튼
  workflow_dispatch:
    inputs:
      services:
        description: '빌드할 서비스 선택'
        type: choice
        required: true
        default: all
        options:
          - all
          - product-service
          - order-service
          - payment-service

# 같은 브랜치에 빠르게 연속 push 시 최신 것만 실행
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # build 중간에 끊기면 ECR에 부분 업로드 위험 → 끝까지

jobs:
  # ─── 1단계: 빌드 대상 서비스 결정 ─────────────────────────────
  # push 트리거 시: paths-filter로 변경된 서비스만
  # workflow_dispatch 시: input으로 받은 서비스 (또는 all)
  detect-changes:
    name: Detect target services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.target.outputs.services }}
    steps:
      - uses: actions/checkout@v6
        with:
          # paths-filter가 직전 커밋과 비교 (push 트리거 시)
          fetch-depth: 2

      # push 트리거 시에만 실행
      - uses: dorny/paths-filter@v3
        if: github.event_name == 'push'
        id: filter
        with:
          filters: |
            product-service:
              - 'product-service/**'
            order-service:
              - 'order-service/**'
            payment-service:
              - 'payment-service/**'

      # 두 트리거의 결과를 통합해 output으로
      - name: Determine target services
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # 수동 트리거 시 — input 사용
            if [ "${{ inputs.services }}" = "all" ]; then
              echo 'services=["product-service","order-service","payment-service"]' >> "$GITHUB_OUTPUT"
              echo "Manual trigger: building ALL services"
            else
              echo "services=[\"${{ inputs.services }}\"]" >> "$GITHUB_OUTPUT"
              echo "Manual trigger: building ${{ inputs.services }}"
            fi
          else
            # push 트리거 시 — paths-filter 결과
            echo 'services=${{ steps.filter.outputs.changes }}' >> "$GITHUB_OUTPUT"
            echo "Push trigger: building changed services"
          fi

  # ─── 2단계: 빌드 + 스캔 + push ──────────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest

    # OIDC 사용을 위한 권한
    permissions:
      id-token: write    # JWT 발급용
      contents: read     # 코드 체크아웃

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      # ─── 코드 체크아웃 ────────────────────────────────────────
      - uses: actions/checkout@v6

      # ─── AWS OIDC 인증 (ADR-0017 첫 실전) ─────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      # ─── ECR 로그인 ────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ─── 이미지 메타데이터 추출 (태그 자동 생성) ────────────────────
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/portfolio/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=short    # 짧은 SHA (예: a1b2c3d)

      # ─── ⭐ Idempotent 사전 체크 ─────────────────────────────
      # ECR에 이미 같은 SHA 태그가 있으면 빌드/push 스킵.
      # 같은 commit으로 Re-run, cherry-pick, 머지 충돌 등에 대응.
      # IMMUTABLE 정책(ADR-0016)과 정합 — 같은 태그 재push 거부 사고 방지.
      - name: Check if image already exists in ECR
        id: image-check
        run: |
          set +e   # describe-images 실패해도 다음으로
          aws ecr describe-images \
            --repository-name portfolio/${{ matrix.service }} \
            --image-ids imageTag=${{ steps.meta.outputs.version }} \
            --region ${{ vars.AWS_REGION }} >/dev/null 2>&1
          STATUS=$?
          set -e
          
          if [ $STATUS -eq 0 ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Image ${{ steps.meta.outputs.version }} already exists in ECR — skipping build/push"
          
            # 기존 이미지의 digest 가져오기 (Trivy 스캔용)
            DIGEST=$(aws ecr describe-images \
              --repository-name portfolio/${{ matrix.service }} \
              --image-ids imageTag=${{ steps.meta.outputs.version }} \
              --region ${{ vars.AWS_REGION }} \
              --query 'imageDetails[0].imageDigest' --output text)
            echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "🔨 Image ${{ steps.meta.outputs.version }} not found — proceeding with build"
          fi

      # ─── Java 21 + Gradle 캐싱 (이미지 없을 때만) ─────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      # ─── Gradle 빌드 ───────────────────────────────────────────
      - name: Build jar for ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: ./gradlew clean bootJar --no-daemon

      # ─── Docker BuildKit 셋업 (레이어 캐싱) ───────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── Docker 빌드 + push (BuildKit 캐싱) ────────────────────
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          # BuildKit이 SBOM + provenance 자동 첨부 (ADR-0010 보강 계획 실현)
          provenance: true
          sbom: true

      # ─── Digest 통합 (build 결과 또는 기존 이미지) ────────────
      - name: Determine final digest
        id: digest
        run: |
          if [ "${{ steps.image-check.outputs.exists }}" = "true" ]; then
            echo "value=${{ steps.image-check.outputs.digest }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ steps.build.outputs.digest }}" >> $GITHUB_OUTPUT
          fi

      # ─── Trivy 스캔 (항상 실행 — 이미 있는 이미지도 보안 갱신) ───
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/portfolio/${{ matrix.service }}@${{ steps.build.outputs.digest }}
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
          format: 'table'

      # ─── 5.4: portfolio-manifests image tag 자동 갱신 ────────
      # 이미지 존재 여부와 무관하게 manifest는 항상 갱신 시도.
      # (기존 이미지였더라도 manifest가 옛 tag일 수 있음.)
      # PAT 인증으로 organization 레포에 push.
      - name: Checkout portfolio-manifests
        uses: actions/checkout@v6
        with:
          repository: melan-devops1/portfolio-manifests
          token: ${{ secrets.MANIFESTS_PAT }}
          path: manifests-repo

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v3

      - name: Update image tag in portfolio-manifests
        working-directory: manifests-repo/apps/${{ matrix.service }}/base
        run: |
          # kustomization.yaml의 images: newTag를 새 commit-sha로 갱신
          kustomize edit set image \
            portfolio/${{ matrix.service }}=${{ steps.login-ecr.outputs.registry }}/portfolio/${{ matrix.service }}:${{ steps.meta.outputs.version }}
          
          # 변경사항 확인
          echo "=== 변경된 kustomization.yaml ==="
          cat kustomization.yaml

      - name: Commit and push manifest update
        working-directory: manifests-repo
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          
          # 변경 없으면 commit 생략 (idempotent)
          if git diff --quiet apps/${{ matrix.service }}/base/kustomization.yaml; then
            echo "✅ No changes to commit — manifest already pointing to ${{ steps.meta.outputs.version }}"
            exit 0
          fi
          
          git add apps/${{ matrix.service }}/base/kustomization.yaml
          git commit -m "ci(deploy): bump ${{ matrix.service }} to ${{ steps.meta.outputs.version }} [skip ci]" \
                     -m "Source commit: ${{ github.sha }}" \
                     -m "Triggered by: ${{ github.event_name }}" \
                     -m "Image already in ECR: ${{ steps.image-check.outputs.exists }}" \
                     -m "Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # Push 시 conflict 가능 — 다른 서비스 워크플로우가 동시 push했을 수 있음
          # rebase로 자동 해결 시도 (kustomization.yaml은 서비스별 폴더라 충돌 거의 없음)
          git pull --rebase origin main
          git push

      # ─── Summary 출력 ──────────────────────────────────────────
      - name: Workflow summary
        if: always()
        run: |
          echo "## Build & Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Service**: ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image tag**: \`${{ steps.meta.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image existed**: ${{ steps.image-check.outputs.exists }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest**: \`${{ steps.digest.outputs.value }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Manifest**: portfolio-manifests/apps/${{ matrix.service }}/base/kustomization.yaml" >> $GITHUB_STEP_SUMMARY
          echo "- **GitOps**: ArgoCD가 manifest 변경을 감지하면 자동 배포" >> $GITHUB_STEP_SUMMARY