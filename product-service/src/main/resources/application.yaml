# в”Җв”Җв”Җв”Җв”Җ л¬ём„ң 1 (default - н•ӯмғҒ нҷңм„ұ) в”Җв”Җв”Җв”Җв”Җ
spring:
  application:
    name: product-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  # вӯҗ Graceful shutdown timeout (K8s preStop hookкіј м •н•©)
  lifecycle:
    timeout-per-shutdown-phase: 30s
  mvc:
    problemdetails:
      enabled: true

  # DB м„Өм • (нҷҳкІҪліҖмҲҳ мЈјмһ… к°ҖлҠҘ, K8sм—җм„ң ConfigMap/Secret м—°лҸҷ)
  datasource:
    url: ${DB_URL:jdbc:h2:mem:productdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
        dialect: ${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
    show-sql: true

  # H2 мҪҳмҶ” (лЎңм»¬м—җм„ңл§Ң нҷңм„ұнҷ”)
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful   # вӯҗ K8sм—җм„ң Pod мў…лЈҢ мӢң in-flight мҡ”мІӯ лҢҖкё°

# ==================== вӯҗ DevOps н•өмӢ¬: Actuator ====================
management:
  endpoints:
    web:
      exposure:
        # Prometheusк°Җ кёҒм–ҙк°Ҳ м—”л“ңнҸ¬мқёнҠё + K8s н”„лЎңлёҢмҡ© health
        include: health,info,prometheus,metrics,env,loggers
      base-path: /actuator
  endpoint:
    health:
      probes:
        enabled: true         # Liveness/Readiness л¶„лҰ¬ м—”л“ңнҸ¬мқёнҠё нҷңм„ұнҷ”
      show-details: always
      show-components: always
    prometheus:
      access: read-only
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}   # лӘЁл“  л©”нҠёлҰӯм—җ м„ңл№„мҠӨ нғңк·ё
  prometheus:
    metrics:
      export:
        enabled: true
  info:
    env:
      enabled: true
    build:
      enabled: true           # вӯҗ build-info.properties мһҗлҸҷ л…ём¶ң
    git:
      enabled: true           # вӯҗ Git м •ліҙлҸ„ мһҗлҸҷ л…ём¶ң (м„ нғқ)

# ==================== лЎңк№… ====================
logging:
  level:
    root: INFO
    com.portfolio: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

---
# в”Җв”Җв”Җв”Җв”Җ л¬ём„ң 2 (prod н”„лЎңнҢҢмқјм—җм„ңл§Ң нҷңм„ұ) в”Җв”Җв”Җв”Җв”Җ
# ==================== Profile: prod / k8s ====================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/productdb}
    username: ${DB_USERNAME:product}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate} # вӯҗ нҷҳкІҪліҖмҲҳ мҡ°м„ , м—Ҷмңјл©ҙ validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  h2:
    console:
      enabled: false

logging:
  level:
    root: INFO
    com.portfolio: INFO
    org.hibernate.SQL: INFO
